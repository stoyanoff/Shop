{% extends "admin_base.html" %}
{% block content %}
<div class="container mt-4">
  <h1>Редактирай категория</h1>
  
  <div class="card">
    <div class="card-header">Редактирай категория "{{ category.name }}"</div>
    <div class="card-body">
      <form method="POST">
        <div class="mb-3">
          <label for="name" class="form-label">Име на категория</label>
          <input type="text" class="form-control" id="name" name="name" value="{{ category.name }}" required>
        </div>
        <div class="mb-3">
          <label for="slug" class="form-label">Slug (URL идентификатор)</label>
          <input type="text" class="form-control" id="slug" name="slug" value="{{ category.slug }}" required>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary">Запази промените</button>
          <a href="{{ url_for('admin_categories') }}" class="btn btn-secondary">Отказ</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
