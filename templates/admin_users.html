{% extends "admin_base.html" %}
{% block content %}
<div class="container mt-4">
  <h1>Админ Потребители</h1>
  <div class="table-responsive">
    <table class="table table-striped">
      <thead>
        <tr>
          <th>ID</th>
          <th>Потребителско име</th>
          <th>Реално име</th>
          <th>Роля</th>
          <th>Действия</th>
        </tr>
      </thead>
      <tbody>
        {% for user in users %}
        <tr>
          <td>{{ user.id }}</td>
          <td>{{ user.username }}</td>
          <td>{{ user.realname or '' }}</td>
          <td>{{ user.role or 'customer' }}</td>
          <td>
            <a href="{{ url_for('user_profile', user_id=user.id) }}" class="btn btn-primary btn-sm">Редактирай
              профил</a>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
  {% endblock %}
