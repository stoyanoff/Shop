{% extends "admin_base.html" %}
{% block content %}
<div class="container mt-4">
  <h1>Редактирай потребител</h1>
  
  <div class="card">
    <div class="card-header">Редактирай потребител "{{ user.username }}"</div>
    <div class="card-body">
      <form method="POST">
        <div class="mb-3">
          <label for="username" class="form-label">Потребителско име</label>
          <input type="text" class="form-control" id="username" name="username" value="{{ user.username }}" required>
        </div>
        <div class="mb-3">
          <label for="realname" class="form-label">Реално име</label>
          <input type="text" class="form-control" id="realname" name="realname" value="{{ user.realname or '' }}">
        </div>
        <div class="mb-3">
          <label for="role" class="form-label">Роля</label>
          <select class="form-control" id="role" name="role">
            <option value="customer" {% if user.role == 'customer' %}selected{% endif %}>Customer</option>
            <option value="admin" {% if user.role == 'admin' %}selected{% endif %}>Admin</option>
          </select>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary">Запази промените</button>
          <a href="{{ url_for('admin_users') }}" class="btn btn-secondary">Отказ</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
