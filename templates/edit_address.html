{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
  <h1>Edit Address for User ID {{ user_id }}</h1>
  <form method="post" class="form">
    <div class="mb-3">
      <label for="city" class="form-label">City *</label>
      <input type="text" name="city" id="city" class="form-control" value="{{ address.city }}" required>
    </div>
    <div class="mb-3">
      <label for="postal_code" class="form-label">Postal Code</label>
      <input type="text" name="postal_code" id="postal_code" class="form-control"
        value="{{ address.postal_code or '' }}">
    </div>
    <div class="mb-3">
      <label for="state" class="form-label">State</label>
      <input type="text" name="state" id="state" class="form-control" value="{{ address.state or '' }}">
    </div>
    <div class="mb-3">
      <label for="address_line1" class="form-label">Address Line 1 *</label>
      <input type="text" name="address_line1" id="address_line1" class="form-control"
        value="{{ address.address_line1 }}" required>
    </div>
    <div class="mb-3">
      <label for="address_line2" class="form-label">Address Line 2</label>
      <input type="text" name="address_line2" id="address_line2" class="form-control"
        value="{{ address.address_line2 or '' }}">
    </div>
    <div class="mb-3">
      <label for="country" class="form-label">Country *</label>
      <input type="text" name="country" id="country" class="form-control" value="{{ address.country }}" required>
    </div>
    <div class="form-check mb-3">
      <input type="checkbox" name="is_default" id="is_default" class="form-check-input" {% if address.is_default
        %}checked{% endif %}>
      <label for="is_default" class="form-check-label">Set as Default Address</label>
    </div>
    <button type="submit" class="btn btn-primary">Update Address</button>
    <a href="{{ url_for('user_profile', user_id=user_id) }}" class="btn btn-secondary">Cancel</a>
  </form>
</div>
{% endblock %}
