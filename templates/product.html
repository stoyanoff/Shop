{% extends "base.html" %}
{% block content %}
<div class="row">
  <div class="col-md-6">
    <img src="{{ url_for('static', filename='images/product-placeholder.png') }}" alt="{{ product.name }}"
      class="img-fluid rounded">
  </div>
  <div class="col-md-6">
    <h2 class="text-success">{{ product.name }}</h2>
    <p class="text-muted">{{ product.description }}</p>
    <p class="h4 text-success">Цена: {{ product.price }} лв.</p>
    <p class="text-info">Наличност: {{ product.stock }}</p>
    <div class="mt-4">
      <a href="{{ url_for('add_to_cart', product_id=product.id) }}" class="btn btn-success btn-lg me-2">🛒 Добави в
        количка</a>
      <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">⬅ Обратно в каталога</a>
    </div>
  </div>
</div>
{% endblock %}
