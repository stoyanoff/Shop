{% extends "admin_base.html" %}
{% block content %}
<div class="container mt-4">
  <h2>Добавяне на продукт</h2>
  <form method="post" enctype="multipart/form-data" class="row g-3">
    <div class="col-md-6">
      <label for="name" class="form-label">Име:</label>
      <input type="text" class="form-control" id="name" name="name" required>
    </div>
    <div class="col-md-6">
      <label for="price" class="form-label">Цена (€):</label>
      <input type="number" step="0.01" class="form-control" id="price" name="price" required>
    </div>
    <div class="col-md-6">
      <label for="stock" class="form-label">Наличност:</label>
      <input type="number" class="form-control" id="stock" name="stock" value="0">
    </div>
    <div class="col-md-6">
      <label for="category" class="form-label">Категория:</label>
      <select class="form-control" id="category" name="category_id">
        <option value="">Без категория</option>
        {% for category in categories %}
        <option value="{{ category.id }}">{{ category.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-md-6">
      <label for="service" class="form-label">Услуга:</label>
      <select class="form-control" id="service" name="service_id">
        <option value="">Без услуга</option>
        {% for service in services %}
        <option value="{{ service.id }}">{{ service.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-12">
      <label for="description" class="form-label">Описание:</label>
      <textarea class="form-control" id="description" name="description" rows="3"></textarea>
    </div>
    <div class="col-12">
      <label class="form-label">Изображение:</label>
      <div class="row">
        <div class="col-md-6">
          <label for="image_file" class="form-label">Качи файл (макс. 1024x768):</label>
          <input type="file" class="form-control" id="image_file" name="image_file" accept="image/*">
        </div>
        <div class="col-md-6">
          <label for="image_url" class="form-label">Или въведи URL:</label>
          <input type="url" class="form-control" id="image_url" name="image_url" placeholder="https://example.com/image.jpg">
        </div>
      </div>
      <small class="form-text text-muted">Изберете файл от диска или въведете URL адрес на изображение. Максимален размер: 1024x768 пиксела.</small>
    </div>
    <div class="col-12">
      <button type="submit" class="btn btn-success">Запази продукт</button>
      <a href="{{ url_for('admin_products') }}" class="btn btn-secondary">Отказ</a>
    </div>
  </form>
</div>
{% endblock %}
