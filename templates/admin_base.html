{% extends "base.html" %}

{% block nav %}
{{ super() }}

<!-- Secondary Admin Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mt-2">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Админ Навигация</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#adminNav"
      aria-controls="adminNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="adminNav">
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/admin/panel' %}active{% endif %}"
            href="{{ url_for('admin_panel') }}">Админ Панел</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/admin/statistics' %}active{% endif %}"
            href="{{ url_for('admin_statistics') }}">Статистика</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/admin/users' %}active{% endif %}"
            href="{{ url_for('admin_users') }}">Потребители</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/admin/services' %}active{% endif %}"
            href="{{ url_for('admin_services') }}">Услуги</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/admin/categories' %}active{% endif %}"
            href="{{ url_for('admin_categories') }}">Категории</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/admin/products' %}active{% endif %}"
            href="{{ url_for('admin_products') }}">Продукти</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/admin/orders' %}active{% endif %}"
            href="{{ url_for('admin_orders') }}">Поръчки</a>
        </li>
        <!-- Add more admin links as needed -->
      </ul>
    </div>
  </div>
</nav>
{% endblock %}
