<!doctype html>
<html lang="bg">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Агроаптека</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-success">
    <div class="container-fluid">
      <a class="navbar-brand text-white" href="/">Агроаптека Онлайн</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          {% if session.username %}
          <li class="nav-item">
            <span class="nav-link text-white">Здравей, {{ session.username }}</span>
          </li>
          <li class="nav-item">
            <a class="nav-link text-white" href="{{ url_for('cart') }}">Количка</a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-white" href="{{ url_for('logout') }}">Изход</a>
          </li>
          {% else %}
          <li class="nav-item">
            <a class="nav-link text-white" href="{{ url_for('login') }}">Вход</a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-white" href="{{ url_for('register') }}">Регистрация</a>
          </li>
          {% endif %}
        </ul>
      </div>
    </div>
  </nav>
  <main class="container mt-4">
    {% block content %}{% endblock %}
  </main>
  <footer class="bg-dark text-white text-center py-3 mt-5">
    <p class="mb-0">© 2025 Агроаптека</p>
  </footer>
  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
